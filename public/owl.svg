<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Body -->
  <ellipse cx="50" cy="58" rx="38" ry="36" fill="#C4956A"/>
  <!-- Belly patch -->
  <ellipse cx="50" cy="63" rx="22" ry="24" fill="#F5E6D3"/>
  <!-- Belly feather lines -->
  <path d="M36 52 Q42 58 36 64" stroke="#D4B896" stroke-width="1.5" fill="none"/>
  <path d="M44 50 Q50 56 44 62" stroke="#D4B896" stroke-width="1.5" fill="none"/>
  <path d="M52 50 Q58 56 52 62" stroke="#D4B896" stroke-width="1.5" fill="none"/>
  <path d="M58 52 Q64 58 58 64" stroke="#D4B896" stroke-width="1.5" fill="none"/>

  <!-- Left ear tuft -->
  <polygon points="22,32 28,18 34,30" fill="#C4956A"/>
  <polygon points="25,32 28,22 31,30" fill="#E8C9A0"/>

  <!-- Right ear tuft -->
  <polygon points="66,30 72,18 78,32" fill="#C4956A"/>
  <polygon points="69,30 72,22 75,32" fill="#E8C9A0"/>

  <!-- Head -->
  <ellipse cx="50" cy="45" rx="32" ry="28" fill="#C4956A"/>

  <!-- Face disc (lighter area around eyes) -->
  <ellipse cx="50" cy="48" rx="24" ry="20" fill="#F0DCC8"/>

  <!-- Left eye white -->
  <circle cx="40" cy="44" r="12" fill="#FFFFFF"/>
  <!-- Left eye iris -->
  <circle cx="40" cy="44" r="8" fill="#2C1810"/>
  <!-- Left eye pupil -->
  <circle cx="40" cy="44" r="5" fill="#1A1A1A"/>
  <!-- Left eye highlight -->
  <circle cx="42.5" cy="41.5" r="2.5" fill="#FFFFFF" opacity="0.9"/>

  <!-- Right eye white -->
  <circle cx="60" cy="44" r="12" fill="#FFFFFF"/>
  <!-- Right eye iris -->
  <circle cx="60" cy="44" r="8" fill="#2C1810"/>
  <!-- Right eye pupil -->
  <circle cx="60" cy="44" r="5" fill="#1A1A1A"/>
  <!-- Right eye highlight -->
  <circle cx="62.5" cy="41.5" r="2.5" fill="#FFFFFF" opacity="0.9"/>

  <!-- Beak -->
  <polygon points="47,50 53,50 50,57" fill="#F4A261"/>
  <polygon points="48,50 52,50 50,55" fill="#E07B3C"/>

  <!-- Eye circles ring -->
  <circle cx="40" cy="44" r="12" fill="none" stroke="#C4956A" stroke-width="1"/>
  <circle cx="60" cy="44" r="12" fill="none" stroke="#C4956A" stroke-width="1"/>

  <!-- Little blush marks -->
  <ellipse cx="33" cy="52" rx="4" ry="2.5" fill="#E8A0A0" opacity="0.5"/>
  <ellipse cx="67" cy="52" rx="4" ry="2.5" fill="#E8A0A0" opacity="0.5"/>

  <!-- Feet -->
  <ellipse cx="40" cy="95" rx="8" ry="4" fill="#E8A04A"/>
  <ellipse cx="50" cy="96" rx="8" ry="4" fill="#E8A04A"/>
  <ellipse cx="60" cy="95" rx="8" ry="4" fill="#E8A04A"/>
</svg>
